substitutions:
  sensor_update: never

esphome:
  name: meteostanica
  friendly_name: Meteostanica
  on_boot:
    priority: -10
    then:
      - script.execute: update_loop

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret meteostanica_api_key

ota:
  - platform: esphome
    password: !secret meteostanica_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  power_save_mode: HIGH
  fast_connect: True

  output_power: 15dB
  post_connect_roaming: False

  ap:
    ssid: !secret meteostanica_ap_ssid
    password: !secret meteostanica_ap_password

  manual_ip:
    static_ip: !secret meteostanica_wifi_ip
    gateway: !secret wifi_gateway
    subnet: !secret wifi_subnet
    dns1: !secret wifi_dns1
    dns2: !secret wifi_dns2

captive_portal:

i2c:
  - id: bus_a
    sda: 21
    scl: 22
    scan: True
    timeout:
      milliseconds: 100
    frequency: 50khz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

  - id: bus_b
    sda: 16
    scl: 17
    scan: True
    frequency: 50khz

ads1115:
  - address: 0x48
    i2c_id: bus_b
    id: ads1115_sensor

sensor:
  - platform: aht10
    variant: AHT10
    temperature:
      name: Teplota
      id: aht10_temperature
    humidity:
      name: Relatívna vlhkosť
      id: aht10_humidity
    update_interval: "${sensor_update}"
    i2c_id: bus_a
    id: aht10_sensor

  - platform: template
    name: "Rosný bod"
    lambda: |-
      return (243.5*(log(id(aht10_humidity).state/100)+((17.67*id(aht10_temperature).state)/
      (243.5+id(aht10_temperature).state)))/(17.67-log(id(aht10_humidity).state/100)-
      ((17.67*id(aht10_temperature).state)/(243.5+id(aht10_temperature).state))));
    unit_of_measurement: °C
    icon: "mdi:thermometer-water"
    accuracy_decimals: 2
    device_class: temperature
    state_class: measurement
    update_interval: "${sensor_update}"
    id: dew_point

  - platform: absolute_humidity
    name: "Absolútna vlhkosť"
    temperature: aht10_temperature
    humidity: aht10_humidity

  - platform: template
    name: "Pocitová teplota"
    lambda: |-
      if (id(aht10_temperature).state < 27.0 || id(aht10_humidity).state < 40.0) {
        return id(aht10_temperature).state;
      }
      float T = (id(aht10_temperature).state * 9.0 / 5.0) + 32.0;
      float RH = id(aht10_humidity).state;
      return ((-42.379 + 2.04901523 * T + 10.14333127 * RH - 0.22475541 * T * RH - 0.00683783 * T * T - 0.05481717 * RH * RH + 0.00122874 * T * T * RH + 0.00085282 * T * RH * RH - 0.00000199 * T * T * RH * RH) - 32.0) * 5.0 / 9.0;
    update_interval: "${sensor_update}"
    unit_of_measurement: ˚C
    accuracy_decimals: 2
    icon: "mdi:thermometer-lines"
    device_class: temperature
    state_class: measurement
    id: feels_like

  - platform: pulse_counter
    pin:
      number: 18
      inverted: true
      mode:
        input: true
        pullup: true
    id: zrazky_pulzy
    internal: True
    update_interval: "${sensor_update}"
    total:
      name: Zrážky
      id: zrazky
      filters:
        - multiply: 0.27
      unit_of_measurement: mm
      state_class: total_increasing
      device_class: precipitation
      accuracy_decimals: 2
      icon: "mdi:weather-pouring"

  # diagnostics
  - platform: wifi_signal
    name: "WiFi signál dB"
    id: wifi_signal_db
    update_interval: "${sensor_update}"
    entity_category: "diagnostic"

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi signál %"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: signal_strength
    state_class: measurement

  - platform: ads1115
    multiplexer: "A0_GND"
    gain: 4.096
    name: "Napätie baterky"
    update_interval: "${sensor_update}"
    filters:
      - lambda: "return x / 0.673;"
    entity_category: "diagnostic"
    id: ads1115_battery

  - platform: ads1115
    multiplexer: "A1_GND"
    gain: 4.096
    name: "Napätie solárneho panelu"
    filters:
      - lambda: "return x / 0.48;"
    update_interval: "${sensor_update}"
    entity_category: "diagnostic"
    id: ads1115_solar

  - platform: aht10
    variant: AHT10
    temperature:
      name: Interná teplota
      id: aht10_internal_temperature
      entity_category: "diagnostic"
    humidity:
      name: Interná relatívna vlhkosť
      id: aht10_internal_humidity
      entity_category: "diagnostic"
    update_interval: "${sensor_update}"
    i2c_id: bus_b
    id: aht10_internal_sensor

  - platform: template
    name: "Interný rosný bod"
    lambda: |-
      return (243.5*(log(id(aht10_internal_humidity).state/100)+((17.67*id(aht10_internal_temperature).state)/
      (243.5+id(aht10_internal_temperature).state)))/(17.67-log(id(aht10_internal_humidity).state/100)-
      ((17.67*id(aht10_internal_temperature).state)/(243.5+id(aht10_internal_temperature).state))));
    unit_of_measurement: °C
    icon: "mdi:thermometer-water"
    update_interval: "${sensor_update}"
    accuracy_decimals: 2
    entity_category: "diagnostic"
    state_class: measurement
    device_class: temperature
    id: dew_point_internal

  - platform: absolute_humidity
    name: "Interná absolútna vlhkosť"
    temperature: aht10_internal_temperature
    humidity: aht10_internal_humidity
    entity_category: "diagnostic"

text_sensor:
  - platform: uptime
    name: "Čas prevádzky"
    entity_category: "diagnostic"
    update_interval: 300s
    id: uptime_sensor

binary_sensor:
  - platform: status
    name: Status
    update_interval: "${sensor_update}"
    entity_category: "diagnostic"
    id: status_sensor

button:
  - platform: restart
    name: "Reštartovať meteostanicu"
    entity_category: "diagnostic"

  - platform: template
    name: "Aktualizovať senzory"
    icon: "mdi:refresh"
    entity_category: diagnostic
    on_press:
      then:
        - script.execute: update_sensors
        - logger.log: "Manual update triggred!"

number:
  - platform: template
    name: "Interval"
    id: dynamic_interval
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 300
    unit_of_measurement: "s"
    optimistic: true
    entity_category: diagnostic
    on_value:
      then:
        - script.stop: update_loop
        - script.execute: update_loop

script:
  - id: update_loop
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            - script.execute: update_sensors
            - delay: !lambda "return id(dynamic_interval).state * 1000;"

  - id: update_sensors
    mode: parallel
    then:
      - delay: 50ms
      - component.update: aht10_sensor
      - delay: 50ms
      - component.update: dew_point
      - delay: 50ms
      - component.update: feels_like
      - delay: 50ms
      - component.update: zrazky_pulzy
      - delay: 50ms
      - component.update: wifi_signal_db
      - delay: 50ms
      - component.update: aht10_internal_sensor
      - delay: 50ms
      - component.update: dew_point_internal
      - delay: 50ms
      - component.update: status_sensor
      - delay: 500ms
      - component.update: ads1115_battery
      - delay: 50ms
      - component.update: ads1115_solar
